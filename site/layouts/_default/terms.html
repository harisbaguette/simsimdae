{{ define "main" }}
<div class="container" style="padding:40px 16px">
  <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:24px">{{ .Title }}</h1>
  <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.Permalink }}" class="genre-btn" style="font-size:.9rem;padding:8px 16px">
      {{ .Page.Title }} ({{ .Count }})
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
