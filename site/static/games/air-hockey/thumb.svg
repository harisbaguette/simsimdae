<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="table" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Hockey table -->
  <rect x="30" y="25" width="340" height="170" rx="15" fill="url(#table)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <!-- Table surface sheen -->
  <rect x="35" y="30" width="330" height="80" rx="12" fill="rgba(255,255,255,0.07)"/>
  <!-- Center line -->
  <line x1="200" y1="25" x2="200" y2="195" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Center circle -->
  <circle cx="200" cy="110" r="30" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <circle cx="200" cy="110" r="5" fill="rgba(255,255,255,0.35)"/>
  <!-- Goals -->
  <rect x="30" y="85" width="18" height="50" rx="4" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <rect x="352" y="85" width="18" height="50" rx="4" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Goal arcs -->
  <path d="M48,85 Q75,110 48,135" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <path d="M352,85 Q325,110 352,135" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Puck -->
  <circle cx="200" cy="110" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="200" cy="110" r="9" fill="rgba(255,255,255,0.15)"/>
  <circle cx="195" cy="105" r="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Puck motion blur -->
  <ellipse cx="178" cy="110" rx="18" ry="8" fill="rgba(30,41,59,0.3)"/>
  <!-- Player 1 mallet (red) -->
  <circle cx="100" cy="140" r="25" fill="#ef4444" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
  <circle cx="100" cy="140" r="12" fill="rgba(255,255,255,0.2)"/>
  <circle cx="100" cy="140" r="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Player 2 mallet (blue) -->
  <circle cx="300" cy="80" r="25" fill="#1e40af" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
  <circle cx="300" cy="80" r="12" fill="rgba(255,255,255,0.2)"/>
  <circle cx="300" cy="80" r="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Score display -->
  <text x="90" y="22" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">2</text>
  <text x="310" y="22" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">3</text>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">에어 하키</text>
</svg>
