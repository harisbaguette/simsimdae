<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Bricks - 5 rows x 7 cols -->
  <!-- Row 1 red -->
  <g fill="#ef4444" stroke="rgba(0,0,0,0.2)" stroke-width="1">
    <rect x="20" y="15" width="50" height="20" rx="3"/>
    <rect x="75" y="15" width="50" height="20" rx="3"/>
    <rect x="130" y="15" width="50" height="20" rx="3"/>
    <rect x="185" y="15" width="50" height="20" rx="3"/>
    <rect x="240" y="15" width="50" height="20" rx="3"/>
    <rect x="295" y="15" width="50" height="20" rx="3"/>
    <rect x="350" y="15" width="40" height="20" rx="3"/>
  </g>
  <!-- Row 2 orange -->
  <g fill="#f97316" stroke="rgba(0,0,0,0.2)" stroke-width="1">
    <rect x="20" y="40" width="50" height="20" rx="3"/>
    <rect x="75" y="40" width="50" height="20" rx="3"/>
    <rect x="130" y="40" width="50" height="20" rx="3"/>
    <!-- Missing brick (broken) -->
    <rect x="240" y="40" width="50" height="20" rx="3"/>
    <rect x="295" y="40" width="50" height="20" rx="3"/>
    <rect x="350" y="40" width="40" height="20" rx="3"/>
  </g>
  <!-- Row 3 yellow -->
  <g fill="#eab308" stroke="rgba(0,0,0,0.2)" stroke-width="1">
    <rect x="20" y="65" width="50" height="20" rx="3"/>
    <rect x="75" y="65" width="50" height="20" rx="3"/>
    <rect x="130" y="65" width="50" height="20" rx="3"/>
    <rect x="185" y="65" width="50" height="20" rx="3"/>
    <!-- Missing -->
    <rect x="295" y="65" width="50" height="20" rx="3"/>
    <rect x="350" y="65" width="40" height="20" rx="3"/>
  </g>
  <!-- Row 4 green -->
  <g fill="#22c55e" stroke="rgba(0,0,0,0.2)" stroke-width="1">
    <rect x="20" y="90" width="50" height="20" rx="3"/>
    <!-- Missing -->
    <rect x="130" y="90" width="50" height="20" rx="3"/>
    <rect x="185" y="90" width="50" height="20" rx="3"/>
    <rect x="240" y="90" width="50" height="20" rx="3"/>
    <rect x="295" y="90" width="50" height="20" rx="3"/>
    <!-- Missing -->
  </g>
  <!-- Row 5 blue (mostly gone) -->
  <g fill="#3b82f6" stroke="rgba(0,0,0,0.2)" stroke-width="1">
    <rect x="20" y="115" width="50" height="20" rx="3"/>
    <rect x="295" y="115" width="50" height="20" rx="3"/>
  </g>
  <!-- Break particles -->
  <g fill="rgba(255,255,255,0.7)">
    <rect x="182" y="42" width="5" height="5" rx="1" transform="rotate(20,184,44)"/>
    <rect x="195" y="38" width="4" height="4" rx="1" transform="rotate(45,197,40)"/>
    <rect x="175" y="56" width="3" height="3" rx="1" transform="rotate(10,176,57)"/>
    <rect x="200" y="55" width="4" height="4" rx="1" transform="rotate(30,202,57)"/>
    <rect x="240" y="68" width="5" height="5" rx="1" transform="rotate(15,242,70)"/>
    <rect x="255" y="62" width="3" height="3" rx="1" transform="rotate(40,256,63)"/>
    <rect x="72" y="93" width="5" height="5" rx="1" transform="rotate(25,74,95)"/>
    <rect x="85" y="88" width="4" height="4" rx="1" transform="rotate(50,87,90)"/>
  </g>
  <!-- Ball trajectory line -->
  <line x1="200" y1="185" x2="200" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="200" y1="60" x2="185" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Ball -->
  <circle cx="200" cy="185" r="10" fill="white" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
  <circle cx="196" cy="181" r="3" fill="rgba(255,255,255,0.5)"/>
  <!-- Paddle -->
  <rect x="150" y="200" width="100" height="14" rx="7" fill="rgba(255,255,255,0.9)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
  <rect x="165" y="203" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>
  <text x="200" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="rgba(234,88,12,0.9)">브릭 브레이크</text>
</svg>
