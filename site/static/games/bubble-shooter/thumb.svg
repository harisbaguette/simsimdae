<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Hex grid of bubbles - top section -->
  <!-- Row 1 -->
  <circle cx="100" cy="30" r="22" fill="#ef4444" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="144" cy="30" r="22" fill="#3b82f6" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="188" cy="30" r="22" fill="#22c55e" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="232" cy="30" r="22" fill="#ef4444" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="276" cy="30" r="22" fill="#3b82f6" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="320" cy="30" r="22" fill="#f59e0b" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Row 2 (offset) -->
  <circle cx="122" cy="70" r="22" fill="#22c55e" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="166" cy="70" r="22" fill="#ef4444" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="210" cy="70" r="22" fill="#f59e0b" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="254" cy="70" r="22" fill="#22c55e" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="298" cy="70" r="22" fill="#ef4444" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Row 3 -->
  <circle cx="100" cy="110" r="22" fill="#3b82f6" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="144" cy="110" r="22" fill="#f59e0b" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="188" cy="110" r="22" fill="#3b82f6" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="232" cy="110" r="22" fill="#ef4444" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="276" cy="110" r="22" fill="#22c55e" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Highlights on bubbles -->
  <circle cx="93" cy="23" r="6" fill="rgba(255,255,255,0.35)"/>
  <circle cx="137" cy="23" r="6" fill="rgba(255,255,255,0.35)"/>
  <circle cx="181" cy="23" r="6" fill="rgba(255,255,255,0.35)"/>
  <!-- Cannon at bottom -->
  <rect x="175" y="168" width="50" height="30" rx="6" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <rect x="188" y="148" width="24" height="30" rx="4" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Aiming bubble in cannon -->
  <circle cx="200" cy="155" r="12" fill="#22c55e" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <!-- Aiming line -->
  <line x1="200" y1="145" x2="188" y2="118" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">버블 슈터</text>
</svg>
