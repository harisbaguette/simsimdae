<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <radialGradient id="bubble-filled" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#a7f3d0"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </radialGradient>
    <radialGradient id="bubble-empty" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Grid of bubbles -->
  <!-- Row 1 -->
  <circle cx="60" cy="50" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="60" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="110" cy="50" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="160" cy="50" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="160" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="210" cy="50" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="210" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="260" cy="50" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="310" cy="50" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="310" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <!-- Row 2 -->
  <circle cx="85" cy="100" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="135" cy="100" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="135" cy="100" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="185" cy="100" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="235" cy="100" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="235" cy="100" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="285" cy="100" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="335" cy="100" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="335" cy="100" r="8" fill="rgba(255,255,255,0.4)"/>
  <!-- Row 3 -->
  <circle cx="60" cy="150" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="60" cy="150" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="110" cy="150" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="110" cy="150" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="160" cy="150" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="210" cy="150" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="210" cy="150" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="260" cy="150" r="22" fill="url(#bubble-filled)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="260" cy="150" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="310" cy="150" r="22" fill="url(#bubble-empty)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Pop sparkle on one bubble -->
  <g transform="translate(110,50)">
    <line x1="0" y1="-30" x2="0" y2="-38" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="21" y1="-21" x2="27" y2="-27" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="30" y1="0" x2="38" y2="0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="-21" y1="-21" x2="-27" y2="-27" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="-30" y1="0" x2="-38" y2="0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">버블 랩</text>
</svg>
