<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <radialGradient id="btn-grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#fca5a5"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Shadow -->
  <circle cx="205" cy="122" r="75" fill="rgba(0,0,0,0.25)"/>
  <!-- Outer ring 3 -->
  <circle cx="200" cy="112" r="88" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
  <!-- Outer ring 2 -->
  <circle cx="200" cy="112" r="74" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <!-- Outer ring 1 -->
  <circle cx="200" cy="112" r="60" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <!-- Main button -->
  <circle cx="200" cy="112" r="52" fill="url(#btn-grad)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <!-- Button highlight -->
  <ellipse cx="185" cy="96" rx="20" ry="12" fill="rgba(255,255,255,0.25)" transform="rotate(-20,185,96)"/>
  <!-- Impact lines -->
  <line x1="200" y1="30" x2="200" y2="15" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="260" y1="52" x2="272" y2="40" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="52" x2="128" y2="40" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="310" y1="112" x2="328" y2="112" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="112" x2="72" y2="112" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <!-- MASH text on button -->
  <text x="200" y="120" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" opacity="0.9">MASH!</text>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">버튼 연타</text>
</svg>
