<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Chess board 8x8 -->
  <rect x="60" y="10" width="280" height="200" rx="4" fill="#b45309"/>
  <!-- Light squares -->
  <g fill="#f0d9b5">
    <rect x="60" y="10" width="35" height="25"/>
    <rect x="130" y="10" width="35" height="25"/>
    <rect x="200" y="10" width="35" height="25"/>
    <rect x="270" y="10" width="35" height="25"/>
    <rect x="95" y="35" width="35" height="25"/>
    <rect x="165" y="35" width="35" height="25"/>
    <rect x="235" y="35" width="35" height="25"/>
    <rect x="305" y="35" width="35" height="25"/>
    <rect x="60" y="60" width="35" height="25"/>
    <rect x="130" y="60" width="35" height="25"/>
    <rect x="200" y="60" width="35" height="25"/>
    <rect x="270" y="60" width="35" height="25"/>
    <rect x="95" y="85" width="35" height="25"/>
    <rect x="165" y="85" width="35" height="25"/>
    <rect x="235" y="85" width="35" height="25"/>
    <rect x="305" y="85" width="35" height="25"/>
    <rect x="60" y="110" width="35" height="25"/>
    <rect x="130" y="110" width="35" height="25"/>
    <rect x="200" y="110" width="35" height="25"/>
    <rect x="270" y="110" width="35" height="25"/>
    <rect x="95" y="135" width="35" height="25"/>
    <rect x="165" y="135" width="35" height="25"/>
    <rect x="235" y="135" width="35" height="25"/>
    <rect x="305" y="135" width="35" height="25"/>
    <rect x="60" y="160" width="35" height="25"/>
    <rect x="130" y="160" width="35" height="25"/>
    <rect x="200" y="160" width="35" height="25"/>
    <rect x="270" y="160" width="35" height="25"/>
    <rect x="95" y="185" width="35" height="25"/>
    <rect x="165" y="185" width="35" height="25"/>
    <rect x="235" y="185" width="35" height="25"/>
    <rect x="305" y="185" width="35" height="25"/>
  </g>
  <!-- Dark squares fill the rest (already brown from board) -->
  <!-- Chess pieces (using Unicode text) -->
  <!-- Black pieces (top rows) -->
  <g font-family="sans-serif" font-size="22" text-anchor="middle" fill="#1a1a1a">
    <text x="77" y="30">♜</text>
    <text x="147" y="30">♞</text>
    <text x="217" y="30">♝</text>
    <text x="287" y="30">♛</text>
    <text x="77" y="55">♟</text>
    <text x="112" y="55">♟</text>
    <text x="182" y="55">♟</text>
    <text x="252" y="55">♟</text>
    <text x="322" y="55">♟</text>
  </g>
  <!-- White pieces (bottom rows) -->
  <g font-family="sans-serif" font-size="22" text-anchor="middle" fill="white" stroke="#999" stroke-width="0.5">
    <text x="77" y="205">♖</text>
    <text x="112" y="205">♘</text>
    <text x="182" y="205">♗</text>
    <text x="252" y="205">♕</text>
    <text x="287" y="205">♔</text>
    <text x="322" y="205">♖</text>
    <text x="77" y="180">♙</text>
    <text x="112" y="180">♙</text>
    <text x="182" y="180">♙</text>
    <text x="252" y="180">♙</text>
    <text x="322" y="180">♙</text>
  </g>
  <!-- Highlighted square (move indicator) -->
  <rect x="165" y="110" width="35" height="25" fill="rgba(255,255,0,0.4)"/>
  <rect x="165" y="135" width="35" height="25" fill="rgba(255,255,0,0.25)"/>
  <!-- Knight piece in play -->
  <text x="182" y="128" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" stroke="#999" stroke-width="0.5">♘</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">체스</text>
</svg>
