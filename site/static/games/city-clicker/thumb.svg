  <rect x="10" y="8" width="160" height="25" rx="6" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="26" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fbbf24">💰 1,482,000</text>
  <rect x="230" y="8" width="160" height="25" rx="6" fill="rgba(0,0,0,0.4)"/>
  <text x="240" y="26" font-family="sans-serif" font-size="13" font-weight="bold" fill="#86efac">👥 42,800명</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">도시 클리커</text>
