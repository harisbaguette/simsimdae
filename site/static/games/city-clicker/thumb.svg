  <rect x="175" y="75" width="50" height="125" fill="#0f172a"/>
  <rect x="225" y="95" width="38" height="105" fill="#1e293b"/>
  <rect x="263" y="70" width="55" height="130" fill="#0f172a"/>
  <rect x="318" y="88" width="42" height="112" fill="#1e293b"/>
