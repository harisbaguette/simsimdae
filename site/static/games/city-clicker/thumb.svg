    <rect x="153" y="108" width="8" height="6" rx="1"/>
    <rect x="140" y="122" width="8" height="6" rx="1"/>
    <rect x="180" y="82" width="9" height="7" rx="1"/>
    <rect x="194" y="82" width="9" height="7" rx="1"/>
    <rect x="207" y="82" width="9" height="7" rx="1"/>
    <rect x="180" y="97" width="9" height="7" rx="1"/>
    <rect x="207" y="97" width="9" height="7" rx="1"/>
    <rect x="268" y="78" width="10" height="8" rx="1"/>
    <rect x="282" y="78" width="10" height="8" rx="1"/>
    <rect x="296" y="78" width="10" height="8" rx="1"/>
    <rect x="268" y="95" width="10" height="8" rx="1"/>
    <rect x="296" y="95" width="10" height="8" rx="1"/>
    <rect x="323" y="96" width="9" height="7" rx="1"/>
    <rect x="336" y="96" width="9" height="7" rx="1"/>
    <rect x="350" y="96" width="9" height="7" rx="1"/>
  </g>
  <!-- Ground/street -->
  <rect x="0" y="175" width="400" height="30" fill="#1e293b"/>
  <line x1="0" y1="188" x2="400" y2="188" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="20,15" opacity="0.6"/>
