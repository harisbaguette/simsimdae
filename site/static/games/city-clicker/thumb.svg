  <circle cx="107" cy="40" r="3" fill="#ef4444" opacity="0.8"/>
  <g fill="#fbbf24" opacity="0.8">
    <rect x="86" y="67" width="10" height="8" rx="1"/>
    <rect x="100" y="67" width="10" height="8" rx="1"/>
    <rect x="114" y="67" width="10" height="8" rx="1"/>
    <rect x="86" y="82" width="10" height="8" rx="1"/>
