    <rect x="18" y="125" width="8" height="6" rx="1"/>
    <rect x="5" y="137" width="8" height="6" rx="1"/>
    <rect x="18" y="145" width="8" height="6" rx="1"/>
    <rect x="5" y="158" width="8" height="6" rx="1"/>
    <rect x="18" y="158" width="8" height="6" rx="1"/>
    <rect x="12" y="112" width="8" height="6" rx="1"/>
  </g>
  <rect x="35" y="90" width="45" height="110" fill="#1e293b"/>
  <rect x="42" y="78" width="12" height="14" fill="#1e293b"/>
  <g fill="#38bdf8" opacity="0.7">
    <rect x="40" y="97" width="9" height="7" rx="1"/>
    <rect x="54" y="97" width="9" height="7" rx="1"/>
    <rect x="68" y="97" width="9" height="7" rx="1"/>
    <rect x="40" y="111" width="9" height="7" rx="1"/>
    <rect x="68" y="111" width="9" height="7" rx="1"/>
    <rect x="40" y="125" width="9" height="7" rx="1"/>
    <rect x="54" y="125" width="9" height="7" rx="1"/>
