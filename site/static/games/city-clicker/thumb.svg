<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="night-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Night sky -->
  <rect x="0" y="0" width="400" height="175" fill="url(#night-sky)"/>
  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="30" cy="20" r="1.5"/><circle cx="75" cy="35" r="1"/><circle cx="120" cy="15" r="1.5"/>
    <circle cx="180" cy="28" r="1"/><circle cx="240" cy="12" r="1.5"/><circle cx="290" cy="40" r="1"/>
    <circle cx="330" cy="18" r="1.5"/><circle cx="370" cy="30" r="1"/><circle cx="55" cy="55" r="1"/>
    <circle cx="160" cy="50" r="1"/><circle cx="315" cy="55" r="1.5"/><circle cx="210" cy="45" r="1"/>
  </g>
  <!-- Moon -->
  <circle cx="350" cy="35" r="18" fill="#fde68a"/>
  <circle cx="360" cy="28" r="14" fill="#1e3a5f"/>
  <!-- City skyline - buildings silhouette -->
