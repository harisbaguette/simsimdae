<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <radialGradient id="red-disc" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#fca5a5"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </radialGradient>
    <radialGradient id="yellow-disc" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Board frame -->
  <rect x="25" y="15" width="350" height="190" rx="10" fill="#1d4ed8"/>
  <!-- 7 columns x 5 rows visible grid (keeping compact) -->
  <!-- Column definitions: x centers at 58, 108, 158, 208, 258, 308, 358 -->
  <!-- Row y centers: row1=32, row2=70, row3=108, row4=146, row5=184 -->
  <!-- Holes (empty = dark blue, filled = disc color) -->
  <!-- Row 1 -->
  <circle cx="58" cy="32" r="18" fill="#1e40af"/>
  <circle cx="108" cy="32" r="18" fill="#1e40af"/>
  <circle cx="158" cy="32" r="18" fill="#1e40af"/>
  <circle cx="208" cy="32" r="18" fill="url(#yellow-disc)"/>
  <circle cx="258" cy="32" r="18" fill="#1e40af"/>
  <circle cx="308" cy="32" r="18" fill="#1e40af"/>
  <circle cx="358" cy="32" r="18" fill="#1e40af"/>
  <!-- Row 2 -->
  <circle cx="58" cy="70" r="18" fill="#1e40af"/>
  <circle cx="108" cy="70" r="18" fill="#1e40af"/>
  <circle cx="158" cy="70" r="18" fill="url(#red-disc)"/>
  <circle cx="208" cy="70" r="18" fill="url(#yellow-disc)"/>
  <circle cx="258" cy="70" r="18" fill="url(#red-disc)"/>
  <circle cx="308" cy="70" r="18" fill="#1e40af"/>
  <circle cx="358" cy="70" r="18" fill="#1e40af"/>
  <!-- Row 3 -->
  <circle cx="58" cy="108" r="18" fill="#1e40af"/>
  <circle cx="108" cy="108" r="18" fill="url(#red-disc)"/>
  <circle cx="158" cy="108" r="18" fill="url(#yellow-disc)"/>
  <circle cx="208" cy="108" r="18" fill="url(#red-disc)"/>
  <circle cx="258" cy="108" r="18" fill="url(#yellow-disc)"/>
  <circle cx="308" cy="108" r="18" fill="#1e40af"/>
  <circle cx="358" cy="108" r="18" fill="#1e40af"/>
  <!-- Row 4 -->
  <circle cx="58" cy="146" r="18" fill="url(#yellow-disc)"/>
  <circle cx="108" cy="146" r="18" fill="url(#red-disc)"/>
  <circle cx="158" cy="146" r="18" fill="url(#yellow-disc)"/>
  <circle cx="208" cy="146" r="18" fill="url(#yellow-disc)"/>
  <circle cx="258" cy="146" r="18" fill="url(#red-disc)"/>
  <circle cx="308" cy="146" r="18" fill="url(#yellow-disc)"/>
  <circle cx="358" cy="146" r="18" fill="#1e40af"/>
  <!-- Row 5 bottom -->
  <circle cx="58" cy="184" r="18" fill="url(#red-disc)"/>
  <circle cx="108" cy="184" r="18" fill="url(#yellow-disc)"/>
  <circle cx="158" cy="184" r="18" fill="url(#red-disc)"/>
  <circle cx="208" cy="184" r="18" fill="url(#red-disc)"/>
  <circle cx="258" cy="184" r="18" fill="url(#yellow-disc)"/>
  <circle cx="308" cy="184" r="18" fill="url(#red-disc)"/>
  <circle cx="358" cy="184" r="18" fill="url(#yellow-disc)"/>
  <!-- Win highlight diagonal -->
  <circle cx="108" cy="184" r="18" fill="url(#yellow-disc)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="158" cy="146" r="18" fill="url(#yellow-disc)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="208" cy="108" r="18" fill="url(#red-disc)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="258" cy="70" r="18" fill="url(#red-disc)" stroke="#fbbf24" stroke-width="3"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">커넥트 포</text>
</svg>
