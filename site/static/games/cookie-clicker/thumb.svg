<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <radialGradient id="cookie-grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Cookie count display -->
  <rect x="90" y="8" width="220" height="28" rx="8" fill="rgba(0,0,0,0.25)"/>
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">🍪 1,247,832</text>
  <!-- Big cookie -->
  <circle cx="200" cy="120" r="78" fill="url(#cookie-grad)" stroke="#92400e" stroke-width="3"/>
  <!-- Cookie texture (cracks/swirls) -->
  <path d="M155,80 Q175,95 165,115 Q155,135 170,155" fill="none" stroke="#92400e" stroke-width="2" opacity="0.5"/>
  <path d="M230,75 Q245,100 235,120 Q225,140 245,160" fill="none" stroke="#92400e" stroke-width="2" opacity="0.5"/>
  <path d="M145,130 Q165,125 185,135 Q205,145 225,135" fill="none" stroke="#92400e" stroke-width="2" opacity="0.4"/>
  <!-- Chocolate chips -->
  <ellipse cx="175" cy="95" rx="10" ry="8" fill="#78350f" transform="rotate(-15,175,95)"/>
  <ellipse cx="215" cy="90" rx="10" ry="8" fill="#78350f" transform="rotate(10,215,90)"/>
  <ellipse cx="190" cy="125" rx="10" ry="8" fill="#78350f" transform="rotate(-5,190,125)"/>
  <ellipse cx="225" cy="130" rx="10" ry="8" fill="#78350f" transform="rotate(20,225,130)"/>
  <ellipse cx="165" cy="145" rx="10" ry="8" fill="#78350f" transform="rotate(-10,165,145)"/>
  <ellipse cx="210" cy="155" rx="10" ry="8" fill="#78350f" transform="rotate(15,210,155)"/>
  <ellipse cx="180" cy="110" rx="7" ry="6" fill="#78350f" transform="rotate(5,180,110)"/>
  <!-- Click sparks -->
  <g fill="#fbbf24" opacity="0.9">
    <polygon points="200,38 203,47 212,47 205,53 208,62 200,56 192,62 195,53 188,47 197,47"/>
  </g>
  <g fill="rgba(255,255,255,0.7)">
    <line x1="130" y1="55" x2="122" y2="46" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
    <line x1="270" y1="55" x2="278" y2="46" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
    <line x1="125" y1="110" x2="112" y2="108" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
    <line x1="275" y1="110" x2="288" y2="108" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
    <line x1="145" y1="165" x2="138" y2="175" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <line x1="255" y1="165" x2="262" y2="175" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Per second display -->
  <rect x="280" y="50" width="108" height="120" rx="8" fill="rgba(0,0,0,0.25)"/>
  <text x="334" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">초당 생산</text>
  <text x="334" y="88" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">847/s</text>
  <line x1="285" y1="96" x2="383" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="295" y="112" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">🖱 클릭 50</text>
  <text x="295" y="126" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">🌾 농장 200</text>
  <text x="295" y="140" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">🏭 공장 597</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">쿠키 클리커</text>
</svg>
