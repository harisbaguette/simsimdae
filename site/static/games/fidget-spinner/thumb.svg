<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <radialGradient id="lobe-grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Motion blur trails -->
  <circle cx="200" cy="108" r="65" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="20"/>
  <circle cx="200" cy="108" r="65" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="35"/>
  <!-- 3-lobe spinner: lobes at 0, 120, 240 degrees -->
  <!-- Lobe 1: top -->
  <ellipse cx="200" cy="52" rx="28" ry="38" fill="url(#lobe-grad)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Lobe 2: bottom-right -->
  <ellipse cx="200" cy="52" rx="28" ry="38" fill="url(#lobe-grad)" stroke="rgba(255,255,255,0.5)" stroke-width="2" transform="rotate(120,200,108)"/>
  <!-- Lobe 3: bottom-left -->
  <ellipse cx="200" cy="52" rx="28" ry="38" fill="url(#lobe-grad)" stroke="rgba(255,255,255,0.5)" stroke-width="2" transform="rotate(240,200,108)"/>
  <!-- Center hub -->
  <circle cx="200" cy="108" r="18" fill="#4f46e5" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <circle cx="200" cy="108" r="10" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <circle cx="200" cy="108" r="4" fill="white" opacity="0.7"/>
  <!-- Lobe end caps -->
  <circle cx="200" cy="22" r="10" fill="rgba(255,255,255,0.5)"/>
  <circle cx="256" cy="120" r="10" fill="rgba(255,255,255,0.5)"/>
  <circle cx="144" cy="120" r="10" fill="rgba(255,255,255,0.5)"/>
  <!-- Speed lines -->
  <path d="M340,60 Q360,80 345,105" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <path d="M350,70 Q375,95 355,115" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">피젯 스피너</text>
</svg>
