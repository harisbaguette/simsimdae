<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Watermelon left half -->
  <path d="M100,60 A70,70 0 0,0 100,190 L100,125 Z" fill="#f43f5e"/>
  <path d="M100,60 A70,70 0 0,0 100,190" fill="none" stroke="#dc2626" stroke-width="2"/>
  <ellipse cx="100" cy="125" rx="5" ry="65" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
  <ellipse cx="100" cy="125" rx="3" ry="60" fill="#22c55e"/>
  <!-- Seeds on left half -->
  <ellipse cx="80" cy="100" rx="4" ry="6" fill="#1a1a1a" transform="rotate(-10,80,100)"/>
  <ellipse cx="88" cy="130" rx="4" ry="6" fill="#1a1a1a" transform="rotate(5,88,130)"/>
  <ellipse cx="75" cy="155" rx="4" ry="6" fill="#1a1a1a" transform="rotate(-15,75,155)"/>
  <!-- Juice splash left -->
  <g fill="rgba(244,63,94,0.6)">
    <ellipse cx="55" cy="95" rx="12" ry="8" transform="rotate(-20,55,95)"/>
    <ellipse cx="45" cy="120" rx="8" ry="5" transform="rotate(15,45,120)"/>
    <ellipse cx="50" cy="145" rx="10" ry="6" transform="rotate(-10,50,145)"/>
    <circle cx="35" cy="110" r="5"/>
    <circle cx="30" cy="135" r="4"/>
  </g>
  <!-- Watermelon right half -->
  <path d="M220,60 A70,70 0 0,1 220,190 L220,125 Z" fill="#f43f5e"/>
  <path d="M220,60 A70,70 0 0,1 220,190" fill="none" stroke="#dc2626" stroke-width="2"/>
  <ellipse cx="220" cy="125" rx="5" ry="65" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
  <ellipse cx="220" cy="125" rx="3" ry="60" fill="#22c55e"/>
  <!-- Seeds on right half -->
  <ellipse cx="240" cy="105" rx="4" ry="6" fill="#1a1a1a" transform="rotate(10,240,105)"/>
  <ellipse cx="235" cy="135" rx="4" ry="6" fill="#1a1a1a" transform="rotate(-5,235,135)"/>
  <ellipse cx="245" cy="160" rx="4" ry="6" fill="#1a1a1a" transform="rotate(15,245,160)"/>
  <!-- Juice splash right -->
  <g fill="rgba(244,63,94,0.6)">
    <ellipse cx="265" cy="95" rx="12" ry="8" transform="rotate(20,265,95)"/>
    <ellipse cx="275" cy="120" rx="8" ry="5" transform="rotate(-15,275,120)"/>
    <ellipse cx="270" cy="148" rx="10" ry="6" transform="rotate(10,270,148)"/>
    <circle cx="285" cy="110" r="5"/>
    <circle cx="290" cy="138" r="4"/>
  </g>
  <!-- Slice blade line -->
  <line x1="155" y1="20" x2="165" y2="200" stroke="rgba(255,255,255,0.85)" stroke-width="3" stroke-linecap="round"/>
  <!-- Blade glow -->
  <line x1="155" y1="20" x2="165" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>
  <!-- Orange on right side -->
  <circle cx="330" cy="120" r="45" fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <ellipse cx="318" cy="106" rx="12" ry="8" fill="rgba(255,255,255,0.2)" transform="rotate(-20,318,106)"/>
  <!-- Slice line on orange -->
  <line x1="305" y1="75" x2="355" y2="165" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">과일 자르기</text>
</svg>
