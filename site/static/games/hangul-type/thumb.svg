  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="18" fill="white" opacity="0.9">가나다라마|</text>
  <rect x="60" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="92" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="124" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="156" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="188" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="220" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="252" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="284" y="178" width="26" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="316" y="178" width="40" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">한글 타이핑</text>
