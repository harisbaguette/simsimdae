<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Falling Korean syllables -->
  <!-- Column 1 -->
  <rect x="18" y="10" width="52" height="42" rx="6" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="44" y="39" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="white">가</text>
  <rect x="18" y="62" width="52" height="42" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="44" y="91" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="white">나</text>
  <rect x="18" y="114" width="52" height="42" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="44" y="143" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">다</text>
  <!-- Column 2 -->
  <rect x="82" y="25" width="52" height="42" rx="6" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
