  <rect x="210" y="18" width="52" height="42" rx="6" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <text x="236" y="47" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="white">자</text>
  <rect x="210" y="70" width="52" height="42" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="236" y="99" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.65)">차</text>
  <!-- Column 5 -->
