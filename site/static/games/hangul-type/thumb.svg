  <text x="108" y="106" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.8)">마</text>
  <!-- Column 3 -->
  <rect x="146" y="10" width="52" height="42" rx="6" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="172" y="39" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="white">바</text>
  <rect x="146" y="62" width="52" height="42" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="172" y="91" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.75)">사</text>
