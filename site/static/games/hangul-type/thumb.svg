  <text x="300" y="39" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="white">카</text>
  <rect x="274" y="62" width="52" height="42" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="300" y="91" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">타</text>
  <!-- Column 6 -->
  <rect x="338" y="20" width="52" height="42" rx="6" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
