<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Speech bubble 1 (left) -->
  <rect x="15" y="20" width="140" height="55" rx="12" fill="white" opacity="0.95"/>
  <polygon points="40,75 25,95 60,75" fill="white" opacity="0.95"/>
  <text x="85" y="50" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#c2410c">사과</text>
  <text x="85" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Apple</text>
  <!-- Speech bubble 2 (right) -->
  <rect x="245" y="20" width="145" height="55" rx="12" fill="white" opacity="0.95"/>
  <polygon points="360,75 375,95 340,75" fill="white" opacity="0.95"/>
  <text x="317" y="50" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#c2410c">과일</text>
  <text x="317" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Fruit</text>
  <!-- Connection line showing word chain -->
  <path d="M155,47 Q200,47 245,47" stroke="rgba(255,255,255,0.7)" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
  <!-- Chain links -->
  <circle cx="200" cy="47" r="8" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <text x="200" y="52" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">끝말</text>
  <!-- Speech bubble 3 (bottom left) -->
  <rect x="20" y="110" width="140" height="55" rx="12" fill="white" opacity="0.88"/>
  <polygon points="100,110 80,90 120,110" fill="white" opacity="0.88"/>
  <text x="90" y="140" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#7c3aed">일상</text>
  <text x="90" y="156" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Daily life</text>
  <!-- Speech bubble 4 (bottom right) -->
  <rect x="240" y="110" width="145" height="55" rx="12" fill="white" opacity="0.88"/>
  <polygon points="280,110 300,90 320,110" fill="white" opacity="0.88"/>
  <text x="312" y="140" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#7c3aed">상자</text>
  <text x="312" y="156" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Box</text>
  <!-- Input area -->
  <rect x="60" y="180" width="280" height="32" rx="10" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="185" y="202" font-family="sans-serif" font-size="16" fill="white" opacity="0.8">자동차|</text>
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white" opacity="0.9">끝말잇기</text>
</svg>
