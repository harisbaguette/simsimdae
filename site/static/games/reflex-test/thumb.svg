<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <radialGradient id="circle-grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Outer rings (anticipation) -->
  <circle cx="200" cy="108" r="95" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="8"/>
  <circle cx="200" cy="108" r="80" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="6"/>
  <circle cx="200" cy="108" r="65" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5"/>
  <!-- Main click circle -->
  <circle cx="200" cy="108" r="52" fill="url(#circle-grad)" stroke="rgba(255,255,255,0.6)" stroke-width="4"/>
  <!-- Inner highlight -->
  <ellipse cx="183" cy="90" rx="20" ry="12" fill="rgba(255,255,255,0.25)" transform="rotate(-20,183,90)"/>
  <!-- TAP text -->
  <text x="200" y="102" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="white" opacity="0.9">TAP!</text>
  <!-- Timer arc -->
  <circle cx="200" cy="108" r="52" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-dasharray="280,46" stroke-dashoffset="-23" stroke-linecap="round"/>
  <!-- Time display -->
  <rect x="155" y="170" width="90" height="30" rx="8" fill="rgba(0,0,0,0.3)"/>
  <text x="200" y="191" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">0.284s</text>
  <!-- Lightning bolts for reflex -->
  <g fill="#fbbf24" stroke="rgba(0,0,0,0.2)" stroke-width="0.5">
    <polygon points="50,60 62,90 55,90 68,120 52,95 60,95 50,60"/>
    <polygon points="340,60 352,90 345,90 358,120 342,95 350,95 340,60"/>
  </g>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">반응속도 테스트</text>
</svg>
