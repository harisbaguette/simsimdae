  <path d="M155,20 L245,20 L225,55 L210,55 L210,45 L190,45 L190,55 L175,55 Z" fill="rgba(180,83,9,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <rect x="188" y="43" width="24" height="14" rx="2" fill="rgba(120,53,15,0.6)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
