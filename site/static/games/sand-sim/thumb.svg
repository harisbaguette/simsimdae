      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="pile-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Sand pile at bottom -->
  <ellipse cx="200" cy="195" rx="160" ry="35" fill="url(#pile-grad)" opacity="0.9"/>
  <ellipse cx="200" cy="185" rx="130" ry="25" fill="#f59e0b" opacity="0.7"/>
  <ellipse cx="200" cy="178" rx="90" ry="18" fill="#fbbf24" opacity="0.5"/>
  <!-- Falling sand particles -->
  <!-- Stream 1 - center -->
  <rect x="196" y="50" width="8" height="6" rx="1" fill="rgba(255,255,255,0.7)"/>
  <rect x="197" y="65" width="6" height="5" rx="1" fill="rgba(255,255,255,0.6)"/>
  <rect x="195" y="80" width="8" height="5" rx="1" fill="rgba(255,200,50,0.8)"/>
  <rect x="198" y="95" width="6" height="6" rx="1" fill="rgba(255,200,50,0.7)"/>
  <rect x="196" y="110" width="7" height="5" rx="1" fill="rgba(251,191,36,0.8)"/>
  <rect x="199" y="125" width="5" height="6" rx="1" fill="rgba(217,119,6,0.8)"/>
  <rect x="197" y="140" width="7" height="5" rx="1" fill="rgba(217,119,6,0.7)"/>
  <!-- Stream 2 - left offset -->
  <rect x="172" y="58" width="6" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="174" y="74" width="7" height="5" rx="1" fill="rgba(255,200,50,0.6)"/>
  <rect x="171" y="90" width="6" height="6" rx="1" fill="rgba(251,191,36,0.7)"/>
  <rect x="173" y="106" width="8" height="5" rx="1" fill="rgba(217,119,6,0.6)"/>
  <rect x="172" y="122" width="6" height="5" rx="1" fill="rgba(180,83,9,0.7)"/>
  <!-- Stream 3 - right offset -->
  <rect x="224" y="62" width="7" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
