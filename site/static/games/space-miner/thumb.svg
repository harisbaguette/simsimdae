<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <radialGradient id="asteroid1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#78716c"/>
      <stop offset="100%" style="stop-color:#44403c"/>
    </radialGradient>
    <radialGradient id="asteroid2" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#57534e"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#9d174d"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Stars -->
  <g fill="white">
    <circle cx="20" cy="15" r="1.5"/><circle cx="55" cy="40" r="1"/><circle cx="90" cy="22" r="1.5"/>
    <circle cx="145" cy="12" r="1"/><circle cx="210" cy="35" r="1.5"/><circle cx="270" cy="18" r="1"/>
    <circle cx="320" cy="42" r="1.5"/><circle cx="365" cy="15" r="1"/><circle cx="385" cy="55" r="1.5"/>
    <circle cx="35" cy="75" r="1"/><circle cx="160" cy="60" r="1.5"/><circle cx="340" cy="70" r="1"/>
    <circle cx="50" cy="160" r="1"/><circle cx="380" cy="140" r="1.5"/><circle cx="15" cy="190" r="1"/>
    <circle cx="120" cy="185" r="1"/><circle cx="290" cy="195" r="1.5"/><circle cx="360" cy="180" r="1"/>
  </g>
  <!-- Planet in background -->
  <circle cx="340" cy="50" r="40" fill="url(#planet)" opacity="0.7"/>
  <ellipse cx="340" cy="50" rx="55" ry="10" fill="none" stroke="rgba(249,168,212,0.5)" stroke-width="4"/>
  <ellipse cx="325" cy="40" rx="15" ry="8" fill="rgba(255,255,255,0.1)"/>
  <!-- Large asteroid (gray) -->
  <ellipse cx="120" cy="80" rx="55" ry="45" fill="url(#asteroid1)" transform="rotate(-15,120,80)"/>
  <!-- Craters on asteroid -->
  <circle cx="105" cy="68" r="12" fill="rgba(0,0,0,0.25)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <circle cx="135" cy="90" r="8" fill="rgba(0,0,0,0.2)"/>
  <circle cx="108" cy="92" r="5" fill="rgba(0,0,0,0.2)"/>
  <!-- Mining sparkles on asteroid -->
  <g fill="#fbbf24">
    <polygon points="130,55 132,62 139,62 133,67 135,74 130,69 125,74 127,67 121,62 128,62"/>
  </g>
  <!-- Small asteroid -->
  <ellipse cx="290" cy="140" rx="32" ry="28" fill="url(#asteroid2)" transform="rotate(20,290,140)"/>
  <circle cx="280" cy="130" r="7" fill="rgba(0,0,0,0.3)"/>
  <circle cx="300" cy="148" r="5" fill="rgba(0,0,0,0.25)"/>
  <!-- Mineral crystals on small asteroid -->
  <polygon points="310,125 315,135 305,135" fill="#a78bfa" opacity="0.9"/>
  <polygon points="318,130 322,140 314,140" fill="#818cf8" opacity="0.8"/>
  <!-- Tiny asteroid -->
  <ellipse cx="60" cy="160" rx="20" ry="16" fill="url(#asteroid1)" transform="rotate(-10,60,160)"/>
  <circle cx="55" cy="155" r="5" fill="rgba(0,0,0,0.25)"/>
  <!-- Spaceship -->
  <g transform="translate(200,120)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="22" ry="12" fill="#e2e8f0"/>
    <!-- Cockpit -->
    <ellipse cx="12" cy="-2" rx="10" ry="8" fill="#7dd3fc" opacity="0.8"/>
    <!-- Wings -->
    <polygon points="-10,12 -30,28 -15,12" fill="#94a3b8"/>
    <polygon points="-10,-12 -30,-28 -15,-12" fill="#94a3b8"/>
    <!-- Engine glow -->
    <ellipse cx="-22" cy="0" rx="8" ry="5" fill="#f97316" opacity="0.8"/>
    <ellipse cx="-30" cy="0" rx="10" ry="4" fill="#fbbf24" opacity="0.5"/>
    <!-- Engine trail -->
    <path d="M-30,0 Q-60,5 -80,0 Q-60,-5 -30,0" fill="rgba(251,191,36,0.3)"/>
    <!-- Mining laser beam -->
    <line x1="18" y1="5" x2="65" y2="45" stroke="#f43f5e" stroke-width="2.5" opacity="0.8"/>
    <circle cx="65" cy="45" r="6" fill="rgba(244,63,94,0.5)"/>
  </g>
  <!-- Resources counter -->
  <rect x="10" y="8" width="130" height="25" rx="6" fill="rgba(0,0,0,0.35)"/>
  <text x="20" y="26" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fbbf24">⛏ 광물: 2,847</text>
  <rect x="260" y="8" width="130" height="25" rx="6" fill="rgba(0,0,0,0.35)"/>
  <text x="270" y="26" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">💎 희귀: 124</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">우주 광부</text>
</svg>
