<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- 9x9 sudoku grid -->
  <rect x="55" y="10" width="290" height="200" rx="6" fill="rgba(255,255,255,0.95)"/>
  <!-- Grid lines thin -->
  <g stroke="rgba(0,0,0,0.15)" stroke-width="0.8">
    <!-- Vertical thin lines -->
    <line x1="88" y1="10" x2="88" y2="210"/>
    <line x1="121" y1="10" x2="121" y2="210"/>
    <line x1="154" y1="10" x2="154" y2="210"/>
    <line x1="187" y1="10" x2="187" y2="210"/>
    <line x1="220" y1="10" x2="220" y2="210"/>
    <line x1="253" y1="10" x2="253" y2="210"/>
    <line x1="286" y1="10" x2="286" y2="210"/>
    <line x1="319" y1="10" x2="319" y2="210"/>
    <!-- Horizontal thin lines -->
    <line x1="55" y1="32" x2="345" y2="32"/>
    <line x1="55" y1="54" x2="345" y2="54"/>
    <line x1="55" y1="76" x2="345" y2="76"/>
    <line x1="55" y1="98" x2="345" y2="98"/>
    <line x1="55" y1="120" x2="345" y2="120"/>
