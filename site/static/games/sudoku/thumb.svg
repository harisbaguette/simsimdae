    <line x1="253" y1="10" x2="253" y2="210"/>
    <line x1="55" y1="76" x2="345" y2="76"/>
    <line x1="55" y1="142" x2="345" y2="142"/>
  </g>
  <!-- Numbers -->
  <g font-family="sans-serif" font-size="14" text-anchor="middle">
    <!-- Given numbers (bold, dark blue) -->
    <g font-weight="bold" fill="#1e3a8a">
      <text x="71" y="27">5</text>
      <text x="104" y="27">3</text>
      <text x="170" y="27">7</text>
      <text x="71" y="49">6</text>
      <text x="203" y="49">1</text>
      <text x="236" y="49">9</text>
      <text x="269" y="49">5</text>
      <text x="137" y="71">9</text>
      <text x="170" y="71">8</text>
      <text x="302" y="71">6</text>
      <text x="71" y="93">8</text>
      <text x="302" y="93">3</text>
      <text x="71" y="115">4</text>
      <text x="137" y="115">8</text>
      <text x="269" y="115">3</text>
      <text x="71" y="137">7</text>
      <text x="302" y="137">2</text>
      <text x="104" y="159">6</text>
      <text x="203" y="159">2</text>
      <text x="104" y="181">2</text>
      <text x="137" y="181">8</text>
      <text x="236" y="181">4</text>
      <text x="302" y="181">1</text>
      <text x="170" y="203">8</text>
      <text x="203" y="203">7</text>
      <text x="335" y="203">9</text>
