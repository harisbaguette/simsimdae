    <g fill="#60a5fa" font-weight="normal">
      <text x="236" y="27">4</text>
      <text x="269" y="27">6</text>
      <text x="302" y="27">8</text>
      <text x="335" y="27">1</text>
      <text x="137" y="49">8</text>
      <text x="170" y="49">7</text>
      <text x="335" y="49">4</text>
      <text x="71" y="71">4</text>
      <text x="104" y="71">2</text>
      <text x="236" y="71">3</text>
      <text x="335" y="71">1</text>
    </g>
  </g>
  <!-- Highlight cell -->
  <rect x="220" y="98" width="33" height="22" rx="2" fill="rgba(96,165,250,0.3)"/>
  <text x="236" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e3a8a" font-weight="bold">5</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">스도쿠</text>
