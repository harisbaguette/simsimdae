<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round">
    <line x1="130" y1="20" x2="130" y2="200"/>
    <line x1="270" y1="20" x2="270" y2="200"/>
    <line x1="50" y1="83" x2="350" y2="83"/>
    <line x1="50" y1="143" x2="350" y2="143"/>
  </g>
  <!-- X marks -->
  <g stroke="#ef4444" stroke-width="8" stroke-linecap="round">
    <!-- Top-left X -->
    <line x1="68" y1="32" x2="112" y2="72"/>
    <line x1="112" y1="32" x2="68" y2="72"/>
    <!-- Center X -->
    <line x1="158" y1="95" x2="202" y2="135"/>
    <line x1="202" y1="95" x2="158" y2="135"/>
    <!-- Bottom-right X -->
    <line x1="288" y1="155" x2="332" y2="195"/>
    <line x1="332" y1="155" x2="288" y2="195"/>
  </g>
  <!-- O circles -->
  <g fill="none" stroke="#38bdf8" stroke-width="8">
    <!-- Top-center O -->
    <circle cx="200" cy="52" r="26"/>
    <!-- Center-left O -->
    <circle cx="90" cy="113" r="26"/>
    <!-- Bottom-center O -->
    <circle cx="200" cy="172" r="26"/>
  </g>
  <!-- Win line through X diagonal -->
  <line x1="90" y1="52" x2="310" y2="172" stroke="rgba(239,68,68,0.5)" stroke-width="6" stroke-linecap="round"/>
  <!-- Top-right X -->
  <g stroke="#ef4444" stroke-width="8" stroke-linecap="round">
    <line x1="288" y1="32" x2="332" y2="72"/>
    <line x1="332" y1="32" x2="288" y2="72"/>
  </g>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">틱택토</text>
</svg>
