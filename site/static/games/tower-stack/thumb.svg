<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="block-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="block-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Tower of stacked blocks centered -->
  <!-- Base block (wide) -->
  <rect x="80" y="188" width="240" height="22" rx="4" fill="#312e81" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Block 1 -->
  <rect x="100" y="162" width="200" height="22" rx="4" fill="url(#block-blue)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="108" y="165" width="184" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Block 2 -->
  <rect x="108" y="136" width="185" height="22" rx="4" fill="url(#block-purple)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="116" y="139" width="169" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Block 3 -->
  <rect x="115" y="110" width="170" height="22" rx="4" fill="url(#block-blue)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="123" y="113" width="154" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Block 4 -->
  <rect x="125" y="84" width="150" height="22" rx="4" fill="url(#block-purple)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="133" y="87" width="134" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Block 5 -->
  <rect x="135" y="58" width="130" height="22" rx="4" fill="url(#block-blue)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="143" y="61" width="114" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Block 6 -->
  <rect x="148" y="32" width="104" height="22" rx="4" fill="url(#block-purple)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="156" y="35" width="88" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Moving block (swinging above, slightly offset) -->
  <rect x="170" y="10" width="85" height="18" rx="4" fill="#fbbf24" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" opacity="0.9"/>
  <!-- Crane rope -->
  <line x1="200" y1="0" x2="200" y2="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Drop zone indicator -->
  <rect x="148" y="10" width="104" height="18" rx="4" fill="none" stroke="rgba(255,255,0,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">타워 쌓기</text>
</svg>
