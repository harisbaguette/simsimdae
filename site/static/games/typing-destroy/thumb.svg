<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Falling word blocks -->
  <rect x="50" y="20" width="80" height="32" rx="6" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="90" y="41" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">HELLO</text>
  <rect x="170" y="10" width="90" height="32" rx="6" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="215" y="31" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">WORLD</text>
  <rect x="285" y="25" width="80" height="32" rx="6" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="325" y="46" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">TYPE</text>
  <!-- Second row -->
  <rect x="30" y="75" width="95" height="32" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="77" y="96" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">SPEED</text>
  <rect x="155" y="68" width="100" height="32" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="205" y="89" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">BLAST!</text>
  <rect x="280" y="78" width="85" height="32" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="322" y="99" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">BOOM</text>
  <!-- Explosion on one word -->
  <g transform="translate(205,89)" opacity="0.9">
    <circle r="28" fill="rgba(255,220,50,0.4)"/>
    <circle r="18" fill="rgba(255,150,0,0.5)"/>
    <line x1="0" y1="-40" x2="0" y2="-52" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="-28" x2="36" y2="-36" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="52" y2="0" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="28" x2="36" y2="36" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="-28" y1="-28" x2="-36" y2="-36" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="-40" y1="0" x2="-52" y2="0" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="-28" y1="28" x2="-36" y2="36" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="0" y2="52" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Keyboard at bottom -->
  <rect x="60" y="148" width="280" height="42" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="72" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="100" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="128" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="156" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="184" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="212" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="240" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="268" y="156" width="22" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="296" y="156" width="32" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.9">타이핑 파괴</text>
</svg>
